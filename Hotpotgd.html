<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>铜锅记 · 火锅外卖</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FBF3E7;
    --cream-2:#F3E6D2;
    --broth:#B7371F;
    --broth-dark:#8E2A17;
    --copper:#C4894A;
    --copper-light:#E3B876;
    --ink:#2B2118;
    --ink-soft:#6B5D4F;
    --line:#E9DCC7;
    --veg:#4C7A52;
    --card:#FFFDF9;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Noto Sans SC', sans-serif;
    padding-bottom:96px;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{ font-family:'Noto Serif SC', serif; }

  /* ---------- Header ---------- */
  .topbar{
    position:sticky; top:0; z-index:40;
    background:var(--cream);
    border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 20px;
    flex-wrap:wrap;
    gap:8px;
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand-mark{ width:34px; height:34px; }
  .brand-name{ font-size:19px; font-weight:700; letter-spacing:.5px; }
  .brand-name span{ color:var(--broth); }
  .top-actions{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .icon-btn{
    width:38px; height:38px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:var(--card); border:1px solid var(--line);
    cursor:pointer; position:relative;
    font-size:14px; font-weight:700; color:var(--ink);
    transition:0.2s;
  }
  .icon-btn:hover{ background:var(--cream-2); }
  .icon-btn.small{ width:34px; height:34px; font-size:12px; }
  .icon-btn.logged-in{ background:var(--broth); color:#fff; border-color:var(--broth); font-weight:800; }

  /* ---------- Hero ---------- */
  .hero{
    position:relative;
    padding:26px 20px 22px;
    background:
      radial-gradient(120% 140% at 50% -10%, #D9552F 0%, var(--broth) 46%, var(--broth-dark) 100%);
    color:#FBF3E7;
    overflow:hidden;
    border-radius:0 0 28px 28px;
  }
  .hero-top{ display:flex; justify-content:space-between; align-items:flex-start; }
  .hero-eyebrow{
    font-size:12px; letter-spacing:2px; text-transform:uppercase;
    color:var(--copper-light); font-weight:600;
  }
  .hero-title{ font-size:30px; font-weight:900; margin-top:6px; }
  .hero-meta{
    display:flex; gap:14px; margin-top:12px; font-size:13px; color:#F1D9C2;
    flex-wrap:wrap;
  }
  .hero-meta b{ color:#fff; }
  .pot-wrap{ width:78px; height:78px; flex-shrink:0; }

  .steam{
    position:absolute; bottom:-10px; opacity:.55;
    filter:blur(1px);
    animation:rise 4.5s ease-in infinite;
  }
  @keyframes rise{
    0%{ transform:translateY(0) scaleX(1); opacity:0; }
    15%{ opacity:.5; }
    100%{ transform:translateY(-70px) scaleX(1.4); opacity:0; }
  }
  @media (prefers-reduced-motion: reduce){ .steam{ animation:none; opacity:0; } }

  /* ---------- stats bar ---------- */
  .stats-bar{
    display:flex; gap:12px; padding:10px 20px; background:var(--cream-2);
    border-bottom:1px solid var(--line); flex-wrap:wrap; font-size:13px; font-weight:600;
  }
  .stats-bar span{ background:var(--card); padding:4px 12px; border-radius:999px; border:1px solid var(--line); }
  .stats-bar .num{ color:var(--broth); margin-left:4px; }

  /* ---------- Category tabs ---------- */
  .tabs{
    position:sticky; top:65px; z-index:35;
    background:var(--cream);
    display:flex; gap:8px; padding:14px 20px 10px;
    overflow-x:auto; border-bottom:1px solid var(--line);
    scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{ display:none; }
  .tab{
    flex-shrink:0; padding:9px 16px; border-radius:999px;
    font-size:13.5px; font-weight:600; color:var(--ink-soft);
    background:var(--card); border:1px solid var(--line);
    cursor:pointer; white-space:nowrap; transition:.2s;
  }
  .tab.active{
    background:var(--broth); color:#fff; border-color:var(--broth);
  }

  /* ---------- Menu ---------- */
  .menu-section{ padding:22px 20px 6px; }
  .section-head{ display:flex; align-items:baseline; gap:10px; margin-bottom:14px; }
  .section-head h2{ font-size:20px; font-weight:700; }
  .section-head .count{ font-size:12.5px; color:var(--ink-soft); }
  .rule{
    height:1px; flex:1;
    background:repeating-linear-gradient(90deg, var(--line) 0 6px, transparent 6px 11px);
  }

  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:14px; }
  .dish{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:16px; display:flex; flex-direction:column; gap:10px;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .dish:hover{ transform:translateY(-2px); box-shadow:0 8px 20px rgba(43,33,24,.08); }
  .dish-top{ display:flex; align-items:center; gap:10px; }
  .bowl{ width:30px; height:30px; flex-shrink:0; }
  .dish-name{ font-size:15px; font-weight:600; line-height:1.3; }
  .dish-tag{ font-size:11px; color:var(--veg); font-weight:600; }
  .dish-bottom{ display:flex; align-items:center; justify-content:space-between; margin-top:2px; }
  .price{ font-size:16.5px; font-weight:700; color:var(--broth); }
  .price::before{ content:"$"; font-size:12px; font-weight:600; margin-right:1px; }

  .stepper{ display:flex; align-items:center; gap:10px; }
  .stepper button{
    width:28px; height:28px; border-radius:50%; border:none; cursor:pointer;
    background:var(--broth); color:#fff; font-size:16px; font-weight:700;
    display:flex; align-items:center; justify-content:center; line-height:0;
  }
  .stepper button.minus{ background:var(--cream-2); color:var(--broth); }
  .stepper .qty{ min-width:16px; text-align:center; font-weight:700; font-size:14px; }
  .add-btn{
    border:none; background:var(--broth); color:#fff; font-weight:700; font-size:13px;
    padding:7px 16px; border-radius:999px; cursor:pointer;
  }
  .add-btn:active{ transform:scale(.96); }

  /* ---------- Cart bar ---------- */
  .cart-bar{
    position:fixed; left:16px; right:16px; bottom:16px; z-index:50;
    background:var(--ink); color:#fff; border-radius:18px;
    padding:14px 18px; display:flex; align-items:center; justify-content:space-between;
    box-shadow:0 12px 30px rgba(43,33,24,.35);
    transform:translateY(140px); opacity:0; transition:.28s ease;
  }
  .cart-bar.show{ transform:translateY(0); opacity:1; }
  .cart-bar-left{ display:flex; align-items:center; gap:12px; }
  .cart-badge{
    width:34px; height:34px; border-radius:50%; background:var(--copper);
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px;
  }
  .cart-total{ font-weight:700; font-size:15px; }
  .cart-sub{ font-size:11.5px; color:#D8CBBA; }
  .checkout-btn{
    background:var(--copper); color:var(--ink); border:none; font-weight:700;
    padding:10px 18px; border-radius:12px; cursor:pointer; font-size:13.5px;
  }

  /* ---------- Overlay / Modal ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(43,33,24,.45); z-index:60;
    display:flex; align-items:flex-end; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .25s ease;
  }
  .overlay.show{ opacity:1; pointer-events:auto; }
  .sheet{
    background:var(--cream); width:100%; max-width:480px; border-radius:22px 22px 0 0;
    max-height:88vh; overflow-y:auto; padding:20px 20px 26px;
    transform:translateY(30px); transition:transform .28s ease;
  }
  .overlay.show .sheet{ transform:translateY(0); }
  .sheet-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .sheet-head h3{ font-size:18px; }
  .close-x{
    width:30px; height:30px; border-radius:50%; border:none; background:var(--cream-2);
    cursor:pointer; font-size:16px; color:var(--ink-soft);
  }

  .cart-line{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 0; border-bottom:1px solid var(--line); gap:10px;
  }
  .cart-line-name{ font-size:14px; font-weight:600; }
  .cart-line-price{ font-size:12.5px; color:var(--ink-soft); }
  .empty-cart{ text-align:center; padding:30px 10px; color:var(--ink-soft); font-size:13.5px; }

  .summary-row{ display:flex; justify-content:space-between; font-size:13.5px; margin-top:8px; color:var(--ink-soft); }
  .summary-row.total{ font-size:16px; font-weight:700; color:var(--ink); margin-top:12px; }

  .field-label{ font-size:12.5px; font-weight:600; color:var(--ink-soft); margin:16px 0 6px; }
  .field-input{
    width:100%; padding:11px 14px; border-radius:12px; border:1px solid var(--line);
    background:var(--card); font-size:14px; font-family:inherit; color:var(--ink);
  }
  .field-input:focus{ outline:2px solid var(--copper); outline-offset:1px; }

  .primary-btn{
    width:100%; margin-top:20px; background:var(--broth); color:#fff; border:none;
    padding:14px; border-radius:14px; font-weight:700; font-size:15px; cursor:pointer;
  }
  .primary-btn:disabled{ background:var(--line); color:var(--ink-soft); cursor:not-allowed; }

  .success{ text-align:center; padding:20px 10px 6px; }
  .success .pot-wrap{ width:64px; height:64px; margin:0 auto 14px; }
  .success h3{ font-size:19px; margin-bottom:6px; }
  .success p{ font-size:13.5px; color:var(--ink-soft); }

  /* ---------- 历史订单样式 ---------- */
  .order-history-item{
    border-bottom:1px solid var(--line);
    padding:10px 0;
    font-size:13px;
  }
  .order-history-item:last-child{ border-bottom:none; }
  .order-history-item .order-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:4px;
  }
  .order-history-item .order-id{
    font-weight:700;
    color:var(--broth);
  }
  .order-history-item .order-status{
    font-size:12px;
    padding:2px 10px;
    border-radius:999px;
    font-weight:600;
  }
  .order-history-item .order-status.delivered{
    background:#E4EFE3;
    color:var(--veg);
  }
  .order-history-item .order-status.rejected{
    background:#F2E0E0;
    color:#9A4A4A;
  }
  .order-history-item .order-status.pending{
    background:#FCE7E1;
    color:var(--broth);
  }
  .order-history-item .order-status.preparing{
    background:#FBEFD9;
    color:#B7871F;
  }
  .order-history-item .order-status.ready{
    background:#E4EAF2;
    color:#4A5F8A;
  }
  .order-history-item .order-items{
    color:var(--ink-soft);
    font-size:12.5px;
    margin:4px 0;
  }
  .order-history-item .order-meta{
    font-size:11px;
    color:var(--ink-soft);
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:4px;
  }
  .delete-order-btn{
    background:#9A4A4A;
    color:#fff;
    border:none;
    padding:4px 14px;
    border-radius:999px;
    font-size:11px;
    cursor:pointer;
    transition:0.2s;
  }
  .delete-order-btn:hover{
    background:#7A3A3A;
  }

  @media (max-width:420px){
    .hero-title{ font-size:26px; }
    .grid{ grid-template-columns:1fr 1fr; }
  }
  /* fullscreen */
  .fullscreen .topbar{ position:static; }
  .fullscreen .tabs{ position:static; }
</style>
</head>

<script>

const db = firebase.database();
const ordersRef = db.ref('orders');
const usersRef = db.ref('users');
let currentUser = null; // 当前登入的用户 { name, address, phone, password }
const RESTAURANT_ID = "tongguoji";
const RESTAURANT_NAME = "铜锅记";
const RESTAURANT_ADDRESS = "304 Anchorvale Link, Singapore 540304";

const DATA = {
  categories: [
    {
      id: "signature",

      items: [
        { id:1, name:"麻酱鸡肉", price:8.9, icon:"bowl-red" },

      ]
    },
    {
      id: "veg",
      name: "涮菜拼盘",
      items: [
        { id:13, name:"娃娃菜拼盘", price:3.9, tag:"素", icon:"bowl-green" },
        { id:14, name:"金针菇拼盘", price:3.9, tag:"素", icon:"bowl-green" },
        { id:15, name:"手打虾滑", price:7.9, icon:"bowl-green" },

        { id:19, name:"冰镇酸奶", price:3.5, icon:"bowl-copper" },
      ]
    }
  ]
};

const cart = {}; // id -> qty
let allOrders = {}; // 缓存订单用于统计

function fmt(n){ return n.toFixed(1); }

function allItems(){
  return DATA.categories.flatMap(c => c.items);
}

function cartCountTotal(){
  let count = 0, total = 0;
  const items = allItems();
  for(const id in cart){
    const qty = cart[id];
    if(qty > 0){
      const item = items.find(i => i.id == id);
      count += qty;
      total += qty * item.price;
    }
  }
  return { count, total };
}

// 统计今日数据
function updateStats(){
  const now = new Date();
  let count = 0, sales = 0;
  Object.values(allOrders).forEach(o => {
    if(!o.createdAt) return;
    const d = new Date(o.createdAt);
    if(d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth() && d.getDate()===now.getDate()){
      if(o.status === 'delivered' || o.status === 'done') {
        count++;
        sales += (o.total || 0);
      }
    }
  });
  document.getElementById('todayCount').textContent = count;
  document.getElementById('todaySales').textContent = '$' + sales.toFixed(1);
}

function renderMenu(){
  const root = document.getElementById('menuRoot');
  root.innerHTML = DATA.categories.map(cat => `
    <div class="menu-section" id="cat-${cat.id}">
      <div class="section-head">
        <h2>${cat.name}</h2>

        cart[id] = (cart[id] || 0) + 1;

        cart[id] = Math.max(0, (cart[id] || 0) - 1);

      renderMenu();
      updateCartBar();
      if(document.getElementById('overlay').classList.contains('show')){
        renderCartSheet();

function updateCartBar(){
  const { count, total } = cartCountTotal();
  const bar = document.getElementById('cartBar');
  document.getElementById('cartCount').textContent = count;
  document.getElementById('cartTotal').textContent = '$' + fmt(total);
  bar.classList.toggle('show', count > 0);
}

function renderCartSheet(){
  const items = allItems();
  const lines = Object.keys(cart).filter(id => cart[id] > 0).map(id => {
    const item = items.find(i => i.id == id);
    const qty = cart[id];
    return `
      <div class="cart-line">
        <div>
          <div class="cart-line-name">${item.name} × ${qty}</div>
          <div class="cart-line-price">$${fmt(item.price)} / 份</div>
        </div>
        <div class="stepper">
          <button class="minus" data-action="minus" data-id="${item.id}">−</button>
          <div class="qty">${qty}</div>
          <button data-action="plus" data-id="${item.id}">+</button>
        </div>
      </div>
    `;
  }).join('');

  const { total } = cartCountTotal();
  const delivery = total > 0 ? 2.9 : 0;
  const grand = total + delivery;

  const sheet = document.getElementById('sheet');
  sheet.innerHTML = `
    <div class="sheet-head">
      <h3 class="display">我的订单</h3>
      <button class="close-x" id="closeSheet">✕</button>
    </div>
    ${lines || `<div class="empty-cart">购物车还是空的，去挑几道菜吧 🍲</div>`}
    ${total > 0 ? `
      <div class="summary-row"><span>菜品小计</span><span>$${fmt(total)}</span></div>
      <div class="summary-row"><span>配送费</span><span>$${fmt(delivery)}</span></div>
      <div class="summary-row total"><span>合计</span><span>$${fmt(grand)}</span></div>

      ${currentUser ? `<div style="font-size:12px; color:var(--veg); margin-top:14px;">✅ 已登入：${currentUser.name}，地址和电话已自动填入</div>` : `<div style="font-size:12px; color:var(--ink-soft); margin-top:14px;">💡 <a href="#" id="loginFromCart" style="color:var(--broth); font-weight:600;">登入账户</a>可自动填入地址和电话</div>`}

      <div class="field-label">配送地址</div>
      <input class="field-input" id="addrInput" placeholder="请输入收货地址" value="${currentUser ? currentUser.address : ''}" />

      <div class="field-label">联系电话</div>
      <input class="field-input" id="phoneInput" placeholder="请输入手机号" value="${currentUser ? currentUser.phone : ''}" />

      <button class="primary-btn" id="placeOrderBtn">提交订单 · $${fmt(grand)}</button>
    ` : ''}
  `;

  sheet.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const action = btn.dataset.action;
      if(action === 'plus') cart[id] = (cart[id] || 0) + 1;
      if(action === 'minus') cart[id] = Math.max(0, (cart[id] || 0) - 1);
      renderMenu();
      updateCartBar();
      renderCartSheet();
    });
  });

  document.getElementById('closeSheet').addEventListener('click', closeOverlay);

  const loginFromCart = document.getElementById('loginFromCart');
  if(loginFromCart){
    loginFromCart.addEventListener('click', (e) => {
      e.preventDefault();
      renderLoginSheet();
    });
  }

  const orderBtn = document.getElementById('placeOrderBtn');
  if(orderBtn){
    orderBtn.addEventListener('click', () => {
      const addr = document.getElementById('addrInput').value.trim();
      const phone = document.getElementById('phoneInput').value.trim();
      if(!addr || !phone){
        orderBtn.textContent = '请填写地址和电话';
        orderBtn.style.background = '#C4894A';
        setTimeout(() => { renderCartSheet(); }, 1400);
        return;
      }

      orderBtn.disabled = true;
      orderBtn.textContent = '正在提交订单…';

      const items = allItems()
        .filter(i => cart[i.id] > 0)
        .map(i => ({ name: i.name, qty: cart[i.id], price: i.price }));
      const { total: subtotal } = cartCountTotal();
      const deliveryFee = 2.9;

      const newOrderRef = ordersRef.push();
      newOrderRef.set({
        restaurantId: RESTAURANT_ID,
        restaurantName: RESTAURANT_NAME,
        restaurantAddress: RESTAURANT_ADDRESS,
        customerName: currentUser ? currentUser.name : '',
        customerAddress: addr,
        customerPhone: phone,
        items,
        subtotal,
        deliveryFee,
        total: subtotal + deliveryFee,
        status: 'pending',
        createdAt: firebase.database.ServerValue.TIMESTAMP,
        updatedAt: firebase.database.ServerValue.TIMESTAMP,
      }).then(() => {
        showSuccess(newOrderRef.key);
        for(const id in cart) cart[id] = 0;
        updateCartBar();
        renderMenu();
      }).catch(err => {
        orderBtn.disabled = false;
        orderBtn.textContent = '提交失败，点击重试';
        console.error('下单失败:', err);
      });
    });
  }
}

function showHistoryOrders(){
  const completedOrders = Object.entries(allOrders)
    .filter(([id, o]) => o.status === 'delivered' || o.status === 'done')
    .sort((a,b) => (b[1].createdAt||0) - (a[1].createdAt||0));

  if(completedOrders.length === 0){
    const sheet = document.getElementById('sheet');
    sheet.innerHTML = `
      <div class="sheet-head">
        <h3 class="display">📋 已完成订单</h3>
        <button class="close-x" id="closeSheet">✕</button>
      </div>
      <div style="padding:40px 20px; text-align:center; color:var(--ink-soft);">
        <div style="font-size:40px; margin-bottom:12px;">📭</div>
        <p>暂无已完成订单</p>
      </div>
    `;
    document.getElementById('closeSheet').addEventListener('click', closeOverlay);
    showOverlay();
    return;
  }

  const statusMap = {
    delivered:'✅ 已送达',
    done:'✅ 已完成',
    rejected:'❌ 已拒绝'
  };

  let html = completedOrders.map(([id, o]) => {
    const status = statusMap[o.status] || o.status;
    const itemsStr = (o.items||[]).map(i => `${i.name}×${i.qty}`).join('、');
    const time = o.createdAt ? new Date(o.createdAt).toLocaleString() : '未知时间';
    
    return `
      <div class="order-history-item" data-order-id="${id}">
        <div class="order-header">
          <span class="order-id">#${id.slice(-6).toUpperCase()}</span>
          <span class="order-status delivered">${status}</span>
        </div>
        <div class="order-items">${itemsStr || '（无菜品）'}</div>
        <div class="order-meta">
          <span>🕐 ${time}</span>
          <span style="font-weight:700; color:var(--broth);">$${(o.total||0).toFixed(1)}</span>
        </div>
        <div class="order-meta" style="margin-top:6px;">
          <span style="font-size:11px; color:var(--ink-soft);">📞 ${o.customerPhone || '—'}</span>
          <button class="delete-order-btn" data-id="${id}">🗑 删除</button>
        </div>
      </div>
    `;
  }).join('');

  const sheet = document.getElementById('sheet');
  sheet.innerHTML = `
    <div class="sheet-head">
      <h3 class="display">📋 已完成订单 (${completedOrders.length})</h3>
      <button class="close-x" id="closeSheet">✕</button>
    </div>
    <div style="max-height:55vh; overflow-y:auto; padding-right:4px;">
      ${html}
    </div>
    <div style="margin-top:12px; text-align:center; font-size:12px; color:var(--ink-soft);">
      💡 点击「删除」可永久移除该订单
    </div>
    <button class="primary-btn" id="downloadHistoryExcelBtn">📥 下载历史订单 Excel</button>
    <button class="primary-btn" id="deleteAllHistoryBtn" style="background:#9A4A4A;">🗑 一键删除所有已完成订单</button>
  `;

  document.getElementById('closeSheet').addEventListener('click', closeOverlay);

  document.getElementById('downloadHistoryExcelBtn').addEventListener('click', () => {
    downloadHistoryOrdersExcel(completedOrders);
  });

  document.getElementById('deleteAllHistoryBtn').addEventListener('click', () => {
    deleteAllCompletedOrders(completedOrders);
  });

  sheet.querySelectorAll('.delete-order-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const orderId = btn.dataset.id;
      if(confirm(`确定要永久删除订单 #${orderId.slice(-6).toUpperCase()} 吗？\n此操作不可恢复！`)) {
        ordersRef.child(orderId).remove()
          .then(() => {
            showHistoryOrders();
          })
          .catch(err => {
            alert('删除失败，请重试');
            console.error('删除失败:', err);
          });
      }
    });
  });

  showOverlay();
}

function downloadHistoryOrdersExcel(completedOrders){
  if(typeof XLSX === 'undefined'){
    alert('Excel 组件加载失败，请检查网络后重试');
    return;
  }
  if(completedOrders.length === 0){
    alert('目前没有已完成订单可供下载');
    return;
  }
  const statusMap = { delivered:'已送达', done:'已完成', rejected:'已拒绝' };
  const rows = completedOrders.map(([id, o]) => ({
    '订单编号': '#' + id.slice(-6).toUpperCase(),
    '状态': statusMap[o.status] || o.status,
    '下单时间': o.createdAt ? new Date(o.createdAt).toLocaleString() : '',
    '顾客姓名': o.customerName || '',
    '联系电话': o.customerPhone || '',
    '收货地址': o.customerAddress || '',
    '菜品明细': (o.items||[]).map(i => `${i.name}×${i.qty}`).join('、'),
    '小计': o.subtotal || 0,
    '配送费': o.deliveryFee || 0,
    '合计': o.total || 0,
  }));
  const totalSales = completedOrders.reduce((sum, [, o]) => sum + (o.total || 0), 0);
  rows.push({});
  rows.push({ '订单编号': '汇总', '菜品明细': `共 ${completedOrders.length} 单`, '合计': totalSales });

  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [
    { wch: 12 }, { wch: 10 }, { wch: 20 }, { wch: 10 },
    { wch: 14 }, { wch: 26 }, { wch: 34 }, { wch: 9 }, { wch: 9 }, { wch: 9 },
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '已完成订单');

  const now = new Date();
  const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  XLSX.writeFile(wb, `铜锅记_历史订单_${dateStr}.xlsx`);
}

function deleteAllCompletedOrders(completedOrders){
  if(completedOrders.length === 0){
    alert('目前没有已完成订单');
    return;
  }
  const input = prompt(`此操作将永久删除全部 ${completedOrders.length} 笔已完成订单，且无法恢复！\n如确认删除，请输入：确认删除`);
  if(input === null) return;
  if(input.trim() !== '确认删除'){
    alert('输入内容不匹配，已取消操作');
    return;
  }
  const updates = {};
  completedOrders.forEach(([id]) => { updates[id] = null; });
  ordersRef.update(updates).then(() => {
    showHistoryOrders();
  }).catch(err => {
    alert('删除失败，请重试');
    console.error('批量删除失败:', err);
  });
}

document.getElementById('historyBtn').addEventListener('click', showHistoryOrders);

function getTodaySalesData(){
  const now = new Date();
  let list = [], count = 0, sales = 0;

  Object.entries(allOrders).forEach(([id, o]) => {
    if(!o.createdAt) return;
    const d = new Date(o.createdAt);
    if(d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth() && d.getDate()===now.getDate()){
      if(o.status === 'delivered' || o.status === 'done') {
        count++;
        sales += (o.total || 0);
        list.push({ id, ...o });
      }
    }
  });

  list.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
  return { list, count, sales };
}

  `;
  document.getElementById('closeSheet').addEventListener('click', closeOverlay);
  document.getElementById('showRegister').addEventListener('click', (e) => {
    e.preventDefault();
    renderRegisterSheet();
  });
  document.getElementById('loginBtn').addEventListener('click', () => {
    const phone = document.getElementById('loginPhone').value.trim();
    const password = document.getElementById('loginPassword').value;
    const msg = document.getElementById('loginMsg');
    if(!phone || !password){
      msg.textContent = '请输入手机号码和密码';
      return;
    }
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = '登入中…';
    usersRef.child(phone).once('value').then(snap => {
      const user = snap.val();
      if(!user || user.password !== password){
        msg.textContent = '手机号码或密码不正确';
        btn.disabled = false;
        btn.textContent = '登入';
        return;
      }
      setCurrentUser(user);
      renderAccountSheet();
    }).catch(err => {
      msg.textContent = '登入失败，请重试';
      btn.disabled = false;
      btn.textContent = '登入';
      console.error('登入失败:', err);
    });
  });
}

function renderRegisterSheet(){
  const sheet = document.getElementById('sheet');
  sheet.innerHTML = `
    <div class="sheet-head">
      <h3 class="display">注册新账户</h3>
      <button class="close-x" id="closeSheet">✕</button>
    </div>
    <div class="field-label">姓名</div>
    <input class="field-input" id="regName" placeholder="请输入姓名" />
    <div class="field-label">地址</div>
    <input class="field-input" id="regAddress" placeholder="请输入收货地址" />
    <div class="field-label">手机号码</div>
    <input class="field-input" id="regPhone" placeholder="请输入手机号码" />
    <div class="field-label">登入密码</div>
    <input class="field-input" id="regPassword" type="password" placeholder="请设置密码" />
    <div id="regMsg" style="color:#9A4A4A; font-size:12.5px; margin-top:8px;"></div>
    <button class="primary-btn" id="registerBtn">注册并登入</button>
    <div style="text-align:center; margin-top:14px; font-size:13px; color:var(--ink-soft);">
      已有账号？<a href="#" id="showLogin" style="color:var(--broth); font-weight:600;">立即登入</a>
    </div>
  `;
  document.getElementById('closeSheet').addEventListener('click', closeOverlay);
  document.getElementById('showLogin').addEventListener('click', (e) => {
    e.preventDefault();
    renderLoginSheet();
  });
  document.getElementById('registerBtn').addEventListener('click', () => {
    const name = document.getElementById('regName').value.trim();
    const address = document.getElementById('regAddress').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const password = document.getElementById('regPassword').value;
    const msg = document.getElementById('regMsg');
    if(!name || !address || !phone || !password){
      msg.textContent = '请完整填写姓名、地址、手机号码和密码';
      return;
    }
    const btn = document.getElementById('registerBtn');
    btn.disabled = true;
    btn.textContent = '注册中…';
    usersRef.child(phone).once('value').then(snap => {
      if(snap.exists()){
        msg.textContent = '该手机号码已被注册，请直接登入';
        btn.disabled = false;
        btn.textContent = '注册并登入';
        return;
      }
      const user = { name, address, phone, password, createdAt: firebase.database.ServerValue.TIMESTAMP };
      return usersRef.child(phone).set(user).then(() => {
        setCurrentUser(user);
        renderAccountSheet();
      });
    }).catch(err => {
      msg.textContent = '注册失败，请重试';
      btn.disabled = false;
      btn.textContent = '注册并登入';
      console.error('注册失败:', err);
    });
  });
}

function renderAccountSheet(){
  const sheet = document.getElementById('sheet');
  sheet.innerHTML = `
    <div class="sheet-head">
      <h3 class="display">我的账户</h3>
      <button class="close-x" id="closeSheet">✕</button>
    </div>
    <div style="background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px;">
      <div style="font-size:16px; font-weight:700; margin-bottom:10px;">👤 ${currentUser.name}</div>
      <div style="font-size:13.5px; color:var(--ink-soft); margin-bottom:6px;">📍 ${currentUser.address}</div>
      <div style="font-size:13.5px; color:var(--ink-soft);">📞 ${currentUser.phone}</div>
    </div>
    <div style="font-size:12px; color:var(--ink-soft); margin-top:10px;">💡 登入后下单会自动带入您的地址和电话</div>
    <button class="primary-btn" id="logoutBtn" style="background:#9A4A4A;">退出登入</button>
  `;
  document.getElementById('closeSheet').addEventListener('click', closeOverlay);
  document.getElementById('logoutBtn').addEventListener('click', () => {
    logout();
    closeOverlay();
  });
}

function setCurrentUser(user){
  currentUser = user;
  try{ localStorage.setItem('tgj_user_phone', user.phone); }catch(e){}
  updateAccountIcon();
}

function logout(){
  currentUser = null;
  try{ localStorage.removeItem('tgj_user_phone'); }catch(e){}
  updateAccountIcon();
}

function updateAccountIcon(){
  const btn = document.getElementById('accountBtn');
  if(!btn) return;
  if(currentUser){
    btn.textContent = (currentUser.name || '?').charAt(0).toUpperCase();
    btn.title = currentUser.name + ' · 点击查看账户';
    btn.classList.add('logged-in');
  } else {
    btn.textContent = '👤';
    btn.title = '登入 / 注册';
    btn.classList.remove('logged-in');
  }
}

function openAccountOverlay(){
  document.getElementById('overlay').classList.add('show');
  if(currentUser){ renderAccountSheet(); } else { renderLoginSheet(); }
}

document.getElementById('accountBtn').addEventListener('click', openAccountOverlay);

// 页面加载时恢复登入状态（账号永久保存，刷新页面后自动登入）
(function restoreLogin(){
  let savedPhone;
  try{ savedPhone = localStorage.getItem('tgj_user_phone'); }catch(e){ savedPhone = null; }
  if(savedPhone){
    usersRef.child(savedPhone).once('value').then(snap => {
      const user = snap.val();
      if(user){
        currentUser = user;
        updateAccountIcon();
      } else {
        try{ localStorage.removeItem('tgj_user_phone'); }catch(e){}
      }
    }).catch(err => console.error('恢复登入失败:', err));
  }
})();

// ============================================
// 初始化
// ============================================
renderTabs();
renderMenu();
updateCartBar();

// 初始加载完成后更新统计
setTimeout(() => {
  ordersRef.once('value', snap => {
    allOrders = snap.val() || {};
    updateStats();
  });
}, 500);
</script>
