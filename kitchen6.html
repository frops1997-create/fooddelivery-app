<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>厨房显示系统 Kitchen Display</title>

<script src="https://www.gstatic.com/firebasejs/10.5.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.2/firebase-database-compat.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#101820;
    color:white;
    font-family:system-ui;
    padding:20px;
}

.container{
    max-width:1600px;
    margin:auto;
}

.header{
    background:#1b2a35;
    padding:20px;
    border-radius:24px;
    margin-bottom:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:15px;
}

.header h1{
    font-size:2rem;
    color:#ffd54f;
}

.stats{
    display:flex;
    gap:20px;
    font-size:1rem;
}

.stats span{
    color:#4caf50;
    font-weight:bold;
}

.orders-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(360px,1fr));
    gap:20px;
}

.order-card{
    background:#1c2c38;
    border-left:8px solid #ff9800;
    border-radius:24px;
    padding:20px;
    box-shadow:0 4px 20px rgba(0,0,0,0.4);
    animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.order-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
    flex-wrap:wrap;
    gap:10px;
}

.order-number{
    background:#ff9800;
    color:black;
    padding:6px 18px;
    border-radius:40px;
    font-size:1.4rem;
    font-weight:bold;
}

.table-number{
    background:#2e7d32;
    padding:6px 18px;
    border-radius:40px;
    font-size:1.2rem;
    font-weight:bold;
}

.order-time{
    color:#ccc;
    font-size:0.9rem;
    margin-bottom:15px;
}

.items-list{
    margin-top:10px;
}

.item-row{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
    border-bottom:1px solid #2f4554;
}

.item-name{
    font-size:1rem;
}

.item-qty{
    color:#ffd54f;
    font-weight:bold;
}

.total{
    margin-top:15px;
    font-size:1.2rem;
    text-align:right;
    color:#4caf50;
    font-weight:bold;
}

.payment{
    margin-top:10px;
    color:#90caf9;
    font-size:0.95rem;
}

.complete-btn{
    width:100%;
    margin-top:18px;
    padding:14px;
    border:none;
    border-radius:18px;
    background:#4caf50;
    color:white;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

.complete-btn:hover{
    background:#66bb6a;
    transform:scale(1.02);
}

.empty{
    text-align:center;
    padding:80px 20px;
    background:#1b2a35;
    border-radius:30px;
    color:#8aa0b3;
    font-size:1.4rem;
}

.loading{
    text-align:center;
    padding:60px;
    font-size:1.3rem;
    color:#ffd54f;
}

@media(max-width:700px){

    body{
        padding:10px;
    }

    .header{
        flex-direction:column;
        text-align:center;
    }

    .orders-grid{
        grid-template-columns:1fr;
    }

}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>👨‍🍳 厨房显示系统</h1>

        <div class="stats">
            <div>📦 制作中：<span id="orderCount">0</span></div>
            <div>🕒 更新时间：<span id="updateTime">--:--</span></div>
        </div>
    </div>

    <div id="ordersGrid" class="orders-grid">
        <div class="loading">
            ⏳ 正在加载订单...
        </div>
    </div>

</div>

<script>

const firebaseConfig = {
    apiKey: "AIzaSyARFD8Zdb7D22XCUJctKM8E-4nVznhqYDc",
    authDomain: "create-for-payment.firebaseapp.com",
    databaseURL: "https://create-for-payment-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "create-for-payment",
    storageBucket: "create-for-payment.firebasestorage.app",
    messagingSenderId: "505063429802",
    appId: "1:505063429802:web:8ec8cca8c788610bad62d3",
    measurementId: "G-SHP91WNP0H"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

const database = firebase.database();

const ordersRef = database.ref('orders');

const grid = document.getElementById('ordersGrid');

const orderCount = document.getElementById('orderCount');

const updateTime = document.getElementById('updateTime');

function updateClock() {

    updateTime.textContent =
        new Date().toLocaleTimeString([],{
            hour:'2-digit',
            minute:'2-digit'
        });
}

function escapeHtml(str){

    if(!str) return '';

    return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');
}

function formatTime(time){

    if(!time) return '--:--';

    try{

        return new Date(time).toLocaleTimeString([],{
            hour:'2-digit',
            minute:'2-digit'
        });

    }catch{

        return '--:--';
    }
}

function createOrderCard(orderId,data){

    const card = document.createElement('div');

    card.className = 'order-card';

    let itemsHtml = '';

    if(data.items && Array.isArray(data.items)){

        data.items.forEach(item=>{

            itemsHtml += `
                <div class="item-row">
                    <div class="item-name">
                        🍽️ ${escapeHtml(item.name)}
                    </div>

                    <div class="item-qty">
                        ×${item.qty || 1}
                    </div>
                </div>
            `;
        });
    }

    card.innerHTML = `

        <div class="order-top">

            <div class="order-number">
                #${data.orderNumber || '---'}
            </div>

            <div class="table-number">
                ${escapeHtml(data.table || '外带')}
            </div>

        </div>

        <div class="order-time">
            🕒 ${formatTime(data.time)}
        </div>

        <div class="items-list">
            ${itemsHtml}
        </div>

        <div class="payment">
            💳 ${escapeHtml(data.paymentMethod || 'Cash')}
        </div>

        <div class="total">
            💰 $${Number(data.total || 0).toFixed(2)}
        </div>

        <button class="complete-btn"
            onclick="completeOrder('${orderId}')">

            ✅ 完成订单

        </button>
    `;

    return card;
}

function renderOrders(allData){

    grid.innerHTML = '';

    if(!allData){

        grid.innerHTML = `
            <div class="empty">
                📭 暂无订单
            </div>
        `;

        orderCount.textContent = 0;

        return;
    }

    let count = 0;

    const entries = Object.entries(allData).reverse();

    entries.forEach(([key,data])=>{

        // 只显示未完成订单
        if(data.completed !== true){

            count++;

            const card = createOrderCard(key,data);

            grid.appendChild(card);
        }
    });

    orderCount.textContent = count;

    if(count === 0){

        grid.innerHTML = `
            <div class="empty">
                🎉 当前没有制作中的订单
            </div>
        `;
    }

    updateClock();
}

function completeOrder(orderId){

    database.ref('orders/' + orderId).update({

        completed:true,
        completedAt:Date.now()

    }).then(()=>{

        console.log('订单完成');

    }).catch(err=>{

        console.error(err);

        alert('更新失败');
    });
}

ordersRef.on('value',(snapshot)=>{

    const data = snapshot.val();

    renderOrders(data);
});

setInterval(updateClock,15000);

updateClock();

</script>

</body>
</html>
